<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>MotorX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #000000, #1a1a1a);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 32px;
      letter-spacing: 2px;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 20px;
      width: 80%;
      max-width: 300px;
      background: #1f1f1f;
      border-radius: 15px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #333;
    }

    #map {
      width: 100%;
      height: 300px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>🚗 MotorX</h1>

<div class="btn" onclick="order('بنزين')">⛽ طلب بنزين</div>
<div class="btn" onclick="order('غسيل')">🧼 غسيل سيارة</div>
<div class="btn" onclick="order('صيانة')">🔧 صيانة</div>
<div class="btn" onclick="order('طوارئ')">🚨 طوارئ</div>

<div id="map"></div>

<script>
  function order(service) {
    alert("تم طلب خدمة: " + service);
  }

  function initMap() {
    var location = { lat: 24.4539, lng: 54.3773 };

    var map = new google.maps.Map(document.getElementById("map"), {
      zoom: 13,
      center: location,
    });

    new google.maps.Marker({
      position: location,
      map: map,
    });
  }
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
</script>

</body>
</html>
