<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotorX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* 🔥 شاشة التحميل */
#splash {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

.logo {
  width: 120px;
  animation: zoom 1.5s ease;
}

@keyframes zoom {
  from {transform: scale(0.5); opacity:0;}
  to {transform: scale(1); opacity:1;}
}

/* ✨ الصفحة */
.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
  display: none;
  animation: fade 1s ease;
}

@keyframes fade {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* 💎 كروت */
.card {
  background: #111;
  padding: 15px;
  border-radius: 15px;
  margin: 10px 0;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
  background: #1c1c1c;
}

/* 🔘 زر */
.btn {
  background: linear-gradient(45deg, red, orange);
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔥 Splash Screen -->
<div id="splash">
  <img src="https://raw.githubusercontent.com/ahmed1079979/MotorX/main/logo.png" class="logo">
  <p>Loading...</p>
</div>

<!-- 🚀 التطبيق -->
<div class="container" id="app">

  <h2>🚗 MotorX</h2>

  <div class="card">🧼 غسيل سيارات</div>
  <div class="card">🔧 صيانة</div>
  <div class="card">🚨 طوارئ</div>

  <div class="btn">اطلب الآن</div>

</div>

<script>

// 🔥 Splash Screen
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("app").style.display = "block";
}, 2000);

</script>

</body>
</html>
