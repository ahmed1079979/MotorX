<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>MotorX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #000000, #1a1a1a);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 32px;
      letter-spacing: 2px;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 20px;
      width: 80%;
      max-width: 300px;
      background: #1f1f1f;
      border-radius: 15px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #333;
    }

    #map {
      width: 100%;
      height: 300px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>🚗 MotorX</h1>
  
<div class="btn" onclick="showRegister()">🏪 تسجيل محل</div>
  <div id="registerBox" style="display:none; margin-top:20px;">

  <input id="shopName" placeholder="اسم المحل"><br><br>

  <select id="shopService">
    <option value="غسيل">🚿 غسيل</option>
    <option value="صيانة">🔧 صيانة</option>
    <option value="طوارئ">🚨 طوارئ</option>
    <div id="shopsList" style="margin-top:20px;"></div>
  </select><br><br>

  <input id="shopPhone" placeholder="رقم الواتساب"><br><br>

  <button onclick="saveShop()">💾 حفظ</button>

</div>
<div class="btn" onclick="order('غسيل')">🧼 غسيل سيارة</div>
<div class="btn" onclick="order('صيانة')">🔧 صيانة</div>
<div class="btn" onclick="order('طوارئ')">🚨 طوارئ</div>

<div id="map"></div>

<script>

let userLocation = null;

// كود الموقع
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition((position) => {
      userLocation = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };
    });
  }
}

window.onload = getLocation;

// 👇 هنا تحط قائمة المحلات (المهم 🔥)
let shops = [
  { name: "غسيل سريع", service: "غسيل", phone: "971500000001" },
  { name: "كراج السرعة", service: "صيانة", phone: "971500000002" },
  { name: "بنشر الطوارئ", service: "طوارئ", phone: "971500000003" }
];
  
let savedShops = JSON.parse(localStorage.getItem("shops")) || [];
shops = shops.concat(savedShops);
  
// 👇 تحتها مباشرة دالة الطلب
function order(service) {
  let list = shops.filter(s => s.service === service);

  let container = document.getElementById("shopsList");
  container.innerHTML = "";

  if (list.length === 0) {
    container.innerHTML = "❌ لا يوجد محلات حالياً";
    return;
  }

  list.forEach(shop => {
    let btn = document.createElement("div");

    btn.innerText = "🏪 " + shop.name;
    btn.style.background = "#222";
    btn.style.color = "white";
    btn.style.padding = "10px";
    btn.style.margin = "10px 0";
    btn.style.borderRadius = "10px";
    btn.style.cursor = "pointer";

    btn.onclick = () => sendWhatsApp(shop, service);

    container.appendChild(btn);
  });
}

  function sendWhatsApp(shop, service) {
  let locationText = userLocation
    ? `📍 https://www.google.com/maps?q=${userLocation.lat},${userLocation.lng}`
    : "📍 الموقع غير متوفر";

  let message = `🚗 MotorX
طلب خدمة: ${service}
${locationText}`;

  let url = `https://wa.me/${shop.phone}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
}
  
  list.forEach(shop => {
    let btn = document.createElement("div");

    btn.innerText = "🏪 " + shop.name;
    btn.style.background = "#222";
    btn.style.color = "white";
    btn.style.padding = "10px";
    btn.style.margin = "10px 0";
    btn.style.borderRadius = "10px";
    btn.style.cursor = "pointer";

    btn.onclick = () => sendToWhatsApp(shop, service);

    container.appendChild(btn);
  });
}

  function initMap() {
    var location = { lat: 24.4539, lng: 54.3773 };

    var map = new google.maps.Map(document.getElementById("map"), {
      zoom: 13,
      center: location,
    });

    new google.maps.Marker({
      position: location,
      map: map,
    });
  }

  function showRegister() {
  document.getElementById("registerBox").style.display = "block";
}

// تحميل المحلات من التخزين
function saveShop() {
  let name = document.getElementById("shopName").value;
  let service = document.getElementById("shopService").value;
  let phone = document.getElementById("shopPhone").value;

  let newShop = { name, service, phone };

  // نحفظ في localStorage
  let savedShops = JSON.parse(localStorage.getItem("shops")) || [];
  savedShops.push(newShop);
  localStorage.setItem("shops", JSON.stringify(savedShops));

  // 🔥 نضيفه مباشرة للقائمة بدون تحديث الصفحة
  shops.push(newShop);

  alert("✅ تم تسجيل المحل!");

  // تنظيف الفورم
  document.getElementById("shopName").value = "";
  document.getElementById("shopPhone").value = "";
}
  
</script>

<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcx2dw0Y-2EXMKpgyCiLe0uPkitOh9rT4&callback=initMap"></script>

</body>
</html>
