<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotorX</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.btn {
  background: #1c1c1c;
  padding: 15px;
  margin: 10px auto;
  width: 80%;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #333;
}

input, select {
  padding: 10px;
  width: 80%;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #00c853;
  color: white;
  cursor: pointer;
}
</style>

</head>
<body>

<h1>🚗 MotorX</h1>

<!-- زر تسجيل محل -->
<div class="btn" onclick="showRegister()">📋 تسجيل محل</div>

<!-- فورم التسجيل -->
<div id="registerBox" style="display:none;">
  <input id="shopName" placeholder="اسم المحل"><br>
  
  <select id="shopService">
    <option value="غسيل">🧼 غسيل سيارة</option>
    <option value="صيانة">🔧 صيانة</option>
    <option value="طوارئ">🚨 طوارئ</option>
  </select><br>

  <input id="shopPhone" placeholder="رقم الواتساب"><br>

  <button onclick="saveShop()">💾 حفظ</button>
</div>

<!-- الأزرار -->
<div class="btn" onclick="order('غسيل')">🧼 غسيل سيارة</div>
<div class="btn" onclick="order('صيانة')">🔧 صيانة</div>
<div class="btn" onclick="order('طوارئ')">🚨 طوارئ</div>

<!-- عرض المحلات -->
<div id="shopsList"></div>

<script>

// 📍 موقع المستخدم
let userLocation = null;

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition((position) => {
      userLocation = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };
    });
  }
}

window.onload = getLocation;


// 🔥 قائمة المحلات الأساسية
let shops = [
  { name: "غسيل سريع", service: "غسيل", phone: "971500000001" },
  { name: "كراج السرعة", service: "صيانة", phone: "971500000002" },
  { name: "بنشر الطوارئ", service: "طوارئ", phone: "971500000003" }
];

// تحميل المحلات من التخزين
let savedShops = JSON.parse(localStorage.getItem("shops")) || [];
shops = shops.concat(savedShops);


// 📋 اظهار الفورم
function showRegister() {
  let box = document.getElementById("registerBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}


// 💾 حفظ محل
function saveShop() {
  let name = document.getElementById("shopName").value;
  let service = document.getElementById("shopService").value;
  let phone = document.getElementById("shopPhone").value;

  if (!name || !phone) {
    alert("❌ املأ كل البيانات");
    return;
  }

  let newShop = { name, service, phone };

  // حفظ
  let savedShops = JSON.parse(localStorage.getItem("shops")) || [];
  savedShops.push(newShop);
  localStorage.setItem("shops", JSON.stringify(savedShops));

  // إضافة مباشرة
  shops.push(newShop);

  alert("✅ تم تسجيل المحل");

  // تنظيف
  document.getElementById("shopName").value = "";
  document.getElementById("shopPhone").value = "";
}


// 📦 عرض المحلات
function order(service) {
  let list = shops.filter(s => s.service === service);

  let container = document.getElementById("shopsList");
  container.innerHTML = "";

  if (list.length === 0) {
    container.innerHTML = "❌ لا يوجد محلات حالياً";
    return;
  }

  list.forEach(shop => {
    let btn = document.createElement("div");

    btn.innerText = "🏪 " + shop.name;
    btn.style.background = "#222";
    btn.style.color = "white";
    btn.style.padding = "10px";
    btn.style.margin = "10px auto";
    btn.style.width = "80%";
    btn.style.borderRadius = "10px";
    btn.style.cursor = "pointer";

    btn.onclick = () => sendWhatsApp(shop, service);

    container.appendChild(btn);
  });
}


// 📲 واتساب
function sendWhatsApp(shop, service) {
  let locationText = userLocation
    ? `📍 https://www.google.com/maps?q=${userLocation.lat},${userLocation.lng}`
    : "📍 الموقع غير متوفر";

  let message = `🚗 MotorX
طلب خدمة: ${service}
${locationText}`;

  let url = `https://wa.me/${shop.phone}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
}

</script>


<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcx2dw0Y-2EXMKpgyCiLe0uPkitOh9rT4&callback=initMap"></script>

</body>
</html>
