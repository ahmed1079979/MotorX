<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotorX</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #0d0d0d;
  color: white;
}

/* Header */
.header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* Cards */
.card {
  background: #1a1a1a;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}

/* Button */
.btn {
  background: #ff3b3b;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
}

/* Inputs */
input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
}

/* Bottom Nav */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.nav div {
  cursor: pointer;
}

/* Pages */
.page { display: none; }
.active { display: block; }
</style>
</head>

<body>

<div class="header">🚗 MotorX</div>

<!-- 🔐 تسجيل -->
<div id="auth" class="page active">

  <div class="card">
    <h3>تسجيل دخول</h3>
    <input id="loginUser" placeholder="اسم المستخدم">
    <input id="loginPass" type="password" placeholder="كلمة المرور">
    <div class="btn" onclick="login()">دخول</div>
  </div>

  <div class="card">
    <h3>إنشاء حساب</h3>
    <input id="regUser" placeholder="اسم المستخدم">
    <input id="regPass" type="password" placeholder="كلمة المرور">
    <div class="btn" onclick="register()">تسجيل</div>
  </div>

</div>

<!-- 🚀 التطبيق -->
<div id="app">

<!-- 🏠 طلب -->
<div id="home" class="page">
  <div class="card">
    <h3>🚗 طلب خدمة</h3>
    <input id="orderService" placeholder="وش تحتاج؟">
    <div class="btn" onclick="makeOrder()">اطلب</div>
  </div>
</div>

<!-- 🏪 محلات -->
<div id="shops" class="page">
  <div class="card">
    <h3>🏪 محلاتي</h3>
    <input id="shopName" placeholder="اسم المحل">
    <input id="shopService" placeholder="الخدمة">
    <input id="shopPrice" placeholder="السعر">
    <div class="btn" onclick="addShop()">إضافة</div>

    <div id="myShops"></div>
  </div>
</div>

<!-- ⭐ تقييم -->
<div id="rate" class="page">
  <div class="card">
    <h3>⭐ تقييم</h3>
    <input id="rateName" placeholder="اسم المحل">
    <input id="rateValue" placeholder="من 5">
    <div class="btn" onclick="rateShop()">إرسال</div>
  </div>
</div>

<!-- 📊 الطلبات -->
<div id="orders" class="page">
  <div class="card">
    <h3>📊 الطلبات</h3>
    <div id="ordersList"></div>
  </div>
</div>

<!-- 🔻 Navigation -->
<div class="nav">
  <div onclick="show('home')">🏠</div>
  <div onclick="show('shops')">🏪</div>
  <div onclick="show('rate')">⭐</div>
  <div onclick="show('orders')">📊</div>
  <div onclick="logout()">🚪</div>
</div>

</div>

<script>

// 🔐 تسجيل
function register(){
  let user = regUser.value;
  let pass = regPass.value;

  if(localStorage.getItem(user)){
    alert("⚠️ موجود");
    return;
  }

  localStorage.setItem(user, pass);
  alert("✅ تم");
}

// دخول
function login(){
  let user = loginUser.value;
  let pass = loginPass.value;

  if(localStorage.getItem(user) === pass){
    localStorage.setItem("currentUser", user);
    startApp();
  } else alert("❌ خطأ");
}

// خروج
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// تشغيل التطبيق
function startApp(){
  auth.style.display = "none";
  show('home');
  displayMyShops();
  displayOrders();
}

if(localStorage.getItem("currentUser")) startApp();

// تنقل
function show(page){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

// 🏪 محلات المستخدم
function addShop(){
  let shops = JSON.parse(localStorage.getItem("shops")||"[]");

  shops.push({
    name: shopName.value,
    service: shopService.value,
    price: shopPrice.value,
    owner: localStorage.getItem("currentUser"),
    rating: 0
  });

  localStorage.setItem("shops", JSON.stringify(shops));
  displayMyShops();
}

// عرض محلاتي
function displayMyShops(){
  let user = localStorage.getItem("currentUser");
  let shops = JSON.parse(localStorage.getItem("shops")||"[]");

  let html = "";
  shops.filter(s=>s.owner===user).forEach(s=>{
    html += `<div class="card">
      ${s.name}<br>
      ${s.service}<br>
      💰${s.price}<br>
      ⭐${s.rating}
    </div>`;
  });

  myShops.innerHTML = html;
}

// ⭐ تقييم
function rateShop(){
  let shops = JSON.parse(localStorage.getItem("shops")||"[]");

  shops.forEach(s=>{
    if(s.name === rateName.value){
      s.rating = rateValue.value;
    }
  });

  localStorage.setItem("shops", JSON.stringify(shops));
  displayMyShops();
}

// 🚗 طلب
function makeOrder(){
  let orders = JSON.parse(localStorage.getItem("orders")||"[]");

  orders.push({
    user: localStorage.getItem("currentUser"),
    service: orderService.value
  });

  localStorage.setItem("orders", JSON.stringify(orders));
  displayOrders();
}

// عرض الطلبات
function displayOrders(){
  let orders = JSON.parse(localStorage.getItem("orders")||"[]");

  let html = "";
  orders.forEach(o=>{
    html += `<div class="card">
      👤 ${o.user}<br>
      🔧 ${o.service}
    </div>`;
  });

  ordersList.innerHTML = html;
}

</script>

</body>
</html>
