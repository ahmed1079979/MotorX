<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotorX</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(180deg, #0a0a0a, #000);
  color: white;
}

/* 🔥 Header */
.header {
  text-align: center;
  padding: 20px;
}

.logo {
  width: 110px;
}

/* 💎 كروت */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  margin: 15px;
  padding: 18px;
  border-radius: 18px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

/* 🟢 زر */
.btn {
  background: linear-gradient(45deg, red, orange);
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
}

/* ✨ Input */
input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: none;
}

/* 🔥 عنوان */
h3 {
  margin: 10px 0;
}
</style>

</head>

<body>

<div class="header">
  <img src="https://raw.githubusercontent.com/ahmed1079979/MotorX/main/logo.png" class="logo">
</div>

<!-- 🏪 تسجيل محل -->
<div class="card">
  <h3>🏪 إضافة محل</h3>
  <input placeholder="اسم المحل">
  <input placeholder="الخدمة">
  <input placeholder="السعر">
  <div class="btn">إضافة</div>
</div>

<!-- 🚗 الخدمات -->
<div class="card">
  <h3>🚗 الخدمات</h3>
  <div class="btn">🧼 غسيل</div>
  <div class="btn">🔧 صيانة</div>
  <div class="btn">🚨 طوارئ</div>
</div>

<!-- ⭐ تقييم -->
<div class="card">
  <h3>⭐ تقييم</h3>
  <input placeholder="اسم المحل">
  <input placeholder="التقييم">
  <div class="btn">إرسال</div>
</div>

<!-- 🤖 AI -->
<div class="card">
  <h3>🤖 تشخيص</h3>
  <input placeholder="وش مشكلة سيارتك؟">
  <div class="btn">تشخيص</div>
</div>

</body>
</html>
