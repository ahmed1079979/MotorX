<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>MotorX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #000000, #1a1a1a);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 32px;
      letter-spacing: 2px;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 20px;
      width: 80%;
      max-width: 300px;
      background: #1f1f1f;
      border-radius: 15px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #333;
    }

    #map {
      width: 100%;
      height: 300px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>🚗 MotorX</h1>

<div class="btn" onclick="order('بنزين')">⛽ طلب بنزين</div>
<div class="btn" onclick="order('غسيل')">🧼 غسيل سيارة</div>
<div class="btn" onclick="order('صيانة')">🔧 صيانة</div>
<div class="btn" onclick="order('طوارئ')">🚨 طوارئ</div>

<div id="map"></div>

<script>
 function order(service) {
  const box = document.createElement("div");

  box.style.position = "fixed";
  box.style.bottom = "20px";
  box.style.left = "50%";
  box.style.transform = "translateX(-50%)";
  box.style.background = "#00c853";
  box.style.color = "white";
  box.style.padding = "15px 25px";
  box.style.borderRadius = "10px";
  box.style.fontSize = "16px";
  box.style.boxShadow = "0 5px 20px rgba(0,0,0,0.3)";
  box.innerText = "✅ تم طلب: " + service;

  document.body.appendChild(box);

  setTimeout(() => {
    box.remove();
  }, 3000);

  localStorage.setItem("lastOrder", service);
}

  function initMap() {
    var location = { lat: 24.4539, lng: 54.3773 };

    var map = new google.maps.Map(document.getElementById("map"), {
      zoom: 13,
      center: location,
    });

    new google.maps.Marker({
      position: location,
      map: map,
    });
  }
</script>

<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcx2dw0Y-2EXMKpgyCiLe0uPkitOh9rT4&callback=initMap"></script>

</body>
</html>
