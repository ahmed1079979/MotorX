<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotorX</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(180deg, #0a0a0a, #000);
  color: white;
  text-align: center;
}

.logo {
  width: 110px;
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  margin: 15px;
  padding: 20px;
  border-radius: 18px;
}

.btn {
  background: linear-gradient(45deg, red, orange);
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
  cursor: pointer;
}

input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<img src="https://raw.githubusercontent.com/ahmed1079979/MotorX/main/logo.png" class="logo">

<!-- 🔐 تسجيل -->
<div id="auth">

  <div class="card">
    <h3>🔐 تسجيل دخول</h3>
    <input id="loginUser" placeholder="اسم المستخدم">
    <input id="loginPass" type="password" placeholder="كلمة المرور">
    <div class="btn" onclick="login()">دخول</div>
  </div>

  <div class="card">
    <h3>🆕 إنشاء حساب</h3>
    <input id="regUser" placeholder="اسم المستخدم">
    <input id="regPass" type="password" placeholder="كلمة المرور">
    <div class="btn" onclick="register()">تسجيل</div>
  </div>

</div>

<!-- 🚀 التطبيق -->
<div id="app" style="display:none;">

  <div class="btn" onclick="logout()">🚪 تسجيل خروج</div>

  <!-- 🏪 إضافة محل -->
  <div class="card">
    <h3>🏪 محلاتي</h3>
    <input id="shopName" placeholder="اسم المحل">
    <input id="shopService" placeholder="الخدمة">
    <input id="shopPrice" placeholder="السعر">
    <div class="btn" onclick="addShop()">إضافة محل</div>
    <div id="myShops"></div>
  </div>

  <!-- ⭐ تقييم -->
  <div class="card">
    <h3>⭐ تقييم المحلات</h3>
    <input id="rateShopName" placeholder="اسم المحل">
    <input id="rateValue" placeholder="من 5">
    <div class="btn" onclick="rateShop()">إرسال</div>
  </div>

  <!-- 🚗 طلب -->
  <div class="card">
    <h3>🚗 طلب خدمة</h3>
    <input id="orderService" placeholder="نوع الخدمة">
    <div class="btn" onclick="makeOrder()">اطلب</div>
  </div>

  <!-- 📊 لوحة التحكم -->
  <div class="card">
    <h3>📊 الطلبات</h3>
    <div id="orders"></div>
  </div>

</div>

<script>

// تسجيل
function register(){
  let user = regUser.value;
  let pass = regPass.value;

  if(localStorage.getItem(user)){
    alert("⚠️ موجود");
    return;
  }

  localStorage.setItem(user, pass);
  alert("✅ تم");
}

// دخول
function login(){
  let user = loginUser.value;
  let pass = loginPass.value;

  if(localStorage.getItem(user) === pass){
    localStorage.setItem("currentUser", user);
    showApp();
  } else alert("❌ خطأ");
}

// خروج
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

function showApp(){
  auth.style.display = "none";
  app.style.display = "block";
  displayMyShops();
  displayOrders();
}

if(localStorage.getItem("currentUser")) showApp();

// 🏪 إضافة محل (مربوط بالمستخدم)
function addShop(){
  let shops = JSON.parse(localStorage.getItem("shops")||"[]");

  let newShop = {
    name: shopName.value,
    service: shopService.value,
    price: shopPrice.value,
    owner: localStorage.getItem("currentUser"),
    rating: 0
  };

  shops.push(newShop);
  localStorage.setItem("shops", JSON.stringify(shops));

  displayMyShops();
}

// عرض محلاتي فقط
function displayMyShops(){
  let user = localStorage.getItem("currentUser");
  let shops = JSON.parse(localStorage.getItem("shops")||"[]");

  let html = "";

  shops.filter(s => s.owner === user).forEach(s => {
    html += `<div class="card">
      ${s.name} - ${s.service} - 💰${s.price}
      ⭐ ${s.rating}
    </div>`;
  });

  myShops.innerHTML = html;
}

// ⭐ تقييم
function rateShop(){
  let shops = JSON.parse(localStorage.getItem("shops")||"[]");

  shops.forEach(s=>{
    if(s.name === rateShopName.value){
      s.rating = rateValue.value;
    }
  });

  localStorage.setItem("shops", JSON.stringify(shops));
  displayMyShops();
}

// 🚗 طلب خدمة
function makeOrder(){
  let orders = JSON.parse(localStorage.getItem("orders")||"[]");

  orders.push({
    user: localStorage.getItem("currentUser"),
    service: orderService.value
  });

  localStorage.setItem("orders", JSON.stringify(orders));
  displayOrders();
}

// 📊 عرض الطلبات
function displayOrders(){
  let orders = JSON.parse(localStorage.getItem("orders")||"[]");

  let html = "";
  orders.forEach(o=>{
    html += `<div class="card">
      👤 ${o.user} - 🔧 ${o.service}
    </div>`;
  });

  document.getElementById("orders").innerHTML = html;
}

</script>

</body>
</html>
