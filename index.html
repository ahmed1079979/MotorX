<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>MotorX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #000000, #1a1a1a);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 32px;
      letter-spacing: 2px;
    }

    .btn {
      display: block;
      margin: 15px auto;
      padding: 20px;
      width: 80%;
      max-width: 300px;
      background: #1f1f1f;
      border-radius: 15px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #333;
    }

    #map {
      width: 100%;
      height: 300px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>🚗 MotorX</h1>

<div class="btn" onclick="order('غسيل')">🧼 غسيل سيارة</div>
<div class="btn" onclick="order('صيانة')">🔧 صيانة</div>
<div class="btn" onclick="order('طوارئ')">🚨 طوارئ</div>

<div id="map"></div>

<script>

let userLocation = null;

// كود الموقع
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition((position) => {
      userLocation = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };
    });
  }
}

window.onload = getLocation;

// 👇 هنا تحط قائمة المحلات (المهم 🔥)
let shops = [
  { name: "غسيل سريع", service: "غسيل", phone: "971500000001" },
  { name: "كراج السرعة", service: "صيانة", phone: "971500000002" },
  { name: "بنشر الطوارئ", service: "طوارئ", phone: "971500000003" }
];

// 👇 تحتها مباشرة دالة الطلب
function order(service) {
  let shop = shops.find(s => s.service === service);

  let locationText = userLocation
    ? `📍 https://www.google.com/maps?q=${userLocation.lat},${userLocation.lng}`
    : "📍 الموقع غير متوفر";

  let message = `🚗 MotorX
طلب خدمة: ${service}
${locationText}`;

  let url = `https://wa.me/${shop.phone}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
}

  function initMap() {
    var location = { lat: 24.4539, lng: 54.3773 };

    var map = new google.maps.Map(document.getElementById("map"), {
      zoom: 13,
      center: location,
    });

    new google.maps.Marker({
      position: location,
      map: map,
    });
  }
</script>

<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcx2dw0Y-2EXMKpgyCiLe0uPkitOh9rT4&callback=initMap"></script>

</body>
</html>
