<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotorX</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #0d0d0d;
  color: white;
}

/* Header */
.header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* Cards */
.card {
  background: #1a1a1a;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}

/* Button */
.btn {
  background: #ff3b3b;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  margin-top: 10px;
}

/* Inputs */
input {
  width: 90%;
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
}

/* Bottom Nav */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.nav div {
  cursor: pointer;
}

/* Hide */
.page {
  display: none;
}

.active {
  display: block;
}
</style>

</head>

<body>

<div class="header">🚗 MotorX</div>

<!-- الصفحات -->

<div id="home" class="page active">
  <div class="card">
    <h3>🚗 طلب خدمة</h3>
    <input placeholder="وش تحتاج؟">
    <div class="btn">اطلب الآن</div>
  </div>
</div>

<div id="shops" class="page">
  <div class="card">
    <h3>🏪 محلاتي</h3>
    <input placeholder="اسم المحل">
    <input placeholder="الخدمة">
    <input placeholder="السعر">
    <div class="btn">إضافة</div>
  </div>
</div>

<div id="rate" class="page">
  <div class="card">
    <h3>⭐ تقييم</h3>
    <input placeholder="اسم المحل">
    <input placeholder="التقييم">
    <div class="btn">إرسال</div>
  </div>
</div>

<div id="orders" class="page">
  <div class="card">
    <h3>📊 الطلبات</h3>
    <p>مافي طلبات حالياً</p>
  </div>
</div>

<!-- Navigation -->
<div class="nav">
  <div onclick="show('home')">🏠</div>
  <div onclick="show('shops')">🏪</div>
  <div onclick="show('rate')">⭐</div>
  <div onclick="show('orders')">📊</div>
</div>

<script>
function show(page){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
