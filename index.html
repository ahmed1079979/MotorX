<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Car Service</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    input, button {
      margin: 10px;
      padding: 10px;
      width: 250px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🚗 خدمات السيارات</h1>

<!-- تسجيل -->
<div>
  <input id="email" placeholder="الإيميل"><br>
  <input id="password" placeholder="كلمة المرور" type="password"><br>
  <button onclick="register()">إنشاء حساب</button>
  <button onclick="login()">تسجيل دخول</button>
</div>

<hr>

<!-- إضافة خدمة -->
<div>
  <h2>إضافة خدمة (للمحل)</h2>
  <input id="serviceName" placeholder="اسم الخدمة"><br>
  <input id="price" placeholder="السعر"><br>
  <button onclick="addService()">إضافة</button>
</div>

<hr>

<!-- عرض الخدمات -->
<div>
  <h2>الخدمات</h2>
  <div id="services"></div>
</div>

<script>
  // 🔥 ضع بيانات Firebase هنا
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
  };

  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  function register() {
    auth.createUserWithEmailAndPassword(
      email.value,
      password.value
    ).then(() => alert("تم التسجيل"));
  }

  function login() {
    auth.signInWithEmailAndPassword(
      email.value,
      password.value
    ).then(() => alert("تم الدخول"));
  }

  function addService() {
    db.collection("services").add({
      name: serviceName.value,
      price: price.value
    });
  }

  function loadServices() {
    db.collection("services").onSnapshot(snapshot => {
      services.innerHTML = "";
      snapshot.forEach(doc => {
        let data = doc.data();
        services.innerHTML += `
          <div class="card">
            <h3>${data.name}</h3>
            <p>${data.price} درهم</p>
          </div>
        `;
      });
    });
  }

  loadServices();
</script>

</body>
</html>
