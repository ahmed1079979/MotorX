<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotorX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
  text-align: center;
}

/* الشعار */
.logo {
  width: 120px;
  margin: 20px auto;
  display: block;
}

/* صندوق */
.container {
  max-width: 400px;
  margin: auto;
}

/* الأزرار */
.btn {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  border: none;
  border-radius: 12px;
  background: #111;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.btn:hover {
  background: red;
}

/* الفورم */
.form {
  display: none;
  margin-top: 20px;
}

input {
  width: 90%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

/* الصفحة الرئيسية */
.dashboard {
  display: none;
}

.card {
  background: #111;
  padding: 15px;
  border-radius: 12px;
  margin: 10px;
}
</style>

</head>
<body>

<img src="https://raw.githubusercontent.com/ahmed1079979/MotorX/main/logo.png" class="logo">

<div class="container">

<!-- الصفحة الرئيسية -->
<div id="home">
  <button class="btn" onclick="showLogin()">تسجيل دخول</button>
  <button class="btn" onclick="showRegister()">إنشاء حساب</button>
</div>

<!-- تسجيل دخول -->
<div id="login" class="form">
  <h3>تسجيل دخول</h3>
  <input type="text" id="loginUser" placeholder="اسم المستخدم">
  <input type="password" id="loginPass" placeholder="كلمة المرور">
  <button class="btn" onclick="login()">دخول</button>
</div>

<!-- إنشاء حساب -->
<div id="register" class="form">
  <h3>إنشاء حساب</h3>
  <input type="text" id="regUser" placeholder="اسم المستخدم">
  <input type="password" id="regPass" placeholder="كلمة المرور">
  <button class="btn" onclick="register()">تسجيل</button>
</div>

<!-- داخل التطبيق -->
<div id="dashboard" class="dashboard">
  <h2>🚗 MotorX</h2>

  <div class="card">🛠️ خدمات السيارات</div>
  <div class="card">🚿 غسيل سيارات</div>
  <div class="card">🔧 صيانة</div>

  <button class="btn" onclick="logout()">تسجيل خروج</button>
</div>

</div>

<script>
// عرض الصفحات
function showLogin(){
  home.style.display = "none";
  login.style.display = "block";
}

function showRegister(){
  home.style.display = "none";
  register.style.display = "block";
}

// تسجيل حساب
function register(){
  let user = regUser.value;
  let pass = regPass.value;

  if(localStorage.getItem(user)){
    alert("الحساب موجود!");
    return;
  }

  localStorage.setItem(user, pass);
  alert("تم إنشاء الحساب");
}

// تسجيل دخول
function login(){
  let user = loginUser.value;
  let pass = loginPass.value;

  if(localStorage.getItem(user) === pass){
    login.style.display = "none";
    dashboard.style.display = "block";
  } else {
    alert("خطأ في البيانات");
  }
}

// تسجيل خروج
function logout(){
  dashboard.style.display = "none";
  home.style.display = "block";
}
</script>


<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcx2dw0Y-2EXMKpgyCiLe0uPkitOh9rT4&callback=initMap"></script>

</body>
</html>
