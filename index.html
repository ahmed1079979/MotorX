<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotorX</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(180deg, #0f0f0f, #000);
  color: white;
  text-align: center;
}

/* 🔥 الهيدر */
.header {
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

/* 🟢 كارد */
.card {
  background: #1a1a1a;
  margin: 10px auto;
  width: 90%;
  padding: 15px;
  border-radius: 15px;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.03);
  background: #222;
}

/* ✨ زر */
.btn {
  background: linear-gradient(45deg, #00c853, #00ff88);
  padding: 12px;
  border-radius: 10px;
  margin: 10px auto;
  width: 60%;
  cursor: pointer;
  color: black;
  font-weight: bold;
}

/* 🔐 فورم */
input, select {
  width: 85%;
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: none;
}

/* 💎 كروت الخدمات */
.service {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  font-size: 18px;
}

/* 🚗 أيقونات */
.icon {
  font-size: 22px;
}
<head>
<style>

.logo {
  width: 120px;
  max-width: 100%;
  height: auto;
  display: block;
  margin: 40px auto;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(-20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<img src="https://raw.githubusercontent.com/ahmed1079979/MotorX/main/logo.png" class="logo">

<!-- 🔐 تسجيل دخول -->
<div id="authBox">

  <div class="card">
    <h3>🔐 تسجيل الدخول</h3>
    <input id="loginPhone" placeholder="رقمك">
    <input id="loginPass" type="password" placeholder="كلمة المرور">
    <div class="btn" onclick="login()">دخول</div>
  </div>

  <div class="card">
    <h3>🆕 إنشاء حساب</h3>
    <input id="regPhone" placeholder="رقمك">
    <input id="regPass" type="password" placeholder="كلمة المرور">
    <div class="btn" onclick="register()">تسجيل</div>
  </div>

</div>

<!-- 🧠 التطبيق -->
<div id="app" style="display:none;">

  <div class="card" onclick="logout()">🚪 تسجيل خروج</div>

  <div class="card" onclick="showRegister()">📋 تسجيل محل</div>

  <div id="registerBox" style="display:none;">
    <div class="card">
      <input id="shopName" placeholder="اسم المحل">
      <select id="shopService">
        <option value="غسيل">🧼 غسيل</option>
        <option value="صيانة">🔧 صيانة</option>
        <option value="طوارئ">🚨 طوارئ</option>
      </select>
      <input id="shopPhone" placeholder="رقم الواتساب">
      <div class="btn" onclick="saveShop()">💾 حفظ</div>
    </div>
  </div>

  <!-- 🚀 الخدمات -->
  <div class="card service" onclick="order('غسيل')">
    🧼 غسيل سيارات <span class="icon">➜</span>
  </div>

  <div class="card service" onclick="order('صيانة')">
    🔧 صيانة <span class="icon">➜</span>
  </div>

  <div class="card service" onclick="order('طوارئ')">
    🚨 طوارئ <span class="icon">➜</span>
  </div>

  <!-- 🏪 المحلات -->
  <div id="shopsList"></div>

</div>

<script>

// المستخدم
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if (currentUser) showApp();

// تسجيل
function register() {
  let phone = regPhone.value;
  let pass = regPass.value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  if (users.some(u => u.phone === phone)) {
    alert("⚠️ الحساب موجود");
    return;
  }

  users.push({ phone, pass });
  localStorage.setItem("users", JSON.stringify(users));

  alert("✅ تم إنشاء الحساب");
}

// دخول
function login() {
  let phone = loginPhone.value;
  let pass = loginPass.value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u => u.phone === phone && u.pass === pass);

  if (!user) return alert("❌ خطأ");

  localStorage.setItem("currentUser", JSON.stringify(user));
  showApp();
}

// خروج
function logout() {
  localStorage.removeItem("currentUser");
  location.reload();
}

// عرض التطبيق
function showApp() {
  authBox.style.display = "none";
  app.style.display = "block";
}

// تسجيل محل
function showRegister() {
  registerBox.style.display = registerBox.style.display === "none" ? "block" : "none";
}

// المحلات
let shops = JSON.parse(localStorage.getItem("shops")) || [];

// حفظ محل
function saveShop() {
  let name = shopName.value;
  let service = shopService.value;
  let phone = shopPhone.value;

  if (shops.some(s => s.phone === phone)) {
    alert("⚠️ الرقم موجود");
    return;
  }

  shops.push({ name, service, phone });

  localStorage.setItem("shops", JSON.stringify(shops));

  alert("✅ تم الحفظ");
}

// عرض
function order(service) {
  let list = shops.filter(s => s.service === service);

  shopsList.innerHTML = "";

  list.forEach(shop => {
    let div = document.createElement("div");

    div.className = "card";
    div.innerText = "🏪 " + shop.name;

    div.onclick = () => {
      window.open(`https://wa.me/${shop.phone}`);
    };

    shopsList.appendChild(div);
  });
}

</script>



<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcx2dw0Y-2EXMKpgyCiLe0uPkitOh9rT4&callback=initMap"></script>

</body>
</html>
