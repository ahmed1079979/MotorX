<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotorX</title>

<style>
body {
  background: #0b0b0b;
  color: white;
  font-family: Arial;
  text-align: center;
}

.btn {
  background: #1c1c1c;
  padding: 15px;
  margin: 10px auto;
  width: 80%;
  border-radius: 12px;
  cursor: pointer;
}

input, select {
  padding: 10px;
  width: 80%;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  background: #00c853;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🚗 MotorX</h1>

<!-- تسجيل / دخول -->
<div id="authBox">

  <h3>🔐 تسجيل الدخول</h3>
  <input id="loginPhone" placeholder="رقمك"><br>
  <input id="loginPass" type="password" placeholder="كلمة المرور"><br>
  <button onclick="login()">دخول</button>

  <h3>🆕 إنشاء حساب</h3>
  <input id="regPhone" placeholder="رقمك"><br>
  <input id="regPass" type="password" placeholder="كلمة المرور"><br>
  <button onclick="register()">تسجيل</button>

</div>

<!-- لوحة المستخدم -->
<div id="app" style="display:none;">

  <div class="btn" onclick="logout()">🚪 تسجيل خروج</div>

  <div class="btn" onclick="showRegister()">📋 تسجيل محل</div>

  <div id="registerBox" style="display:none;">
    <input id="shopName" placeholder="اسم المحل"><br>

    <select id="shopService">
      <option value="غسيل">🧼 غسيل</option>
      <option value="صيانة">🔧 صيانة</option>
      <option value="طوارئ">🚨 طوارئ</option>
    </select><br>

    <input id="shopPhone" placeholder="رقم الواتساب"><br>

    <button onclick="saveShop()">💾 حفظ</button>
  </div>

  <div class="btn" onclick="order('غسيل')">🧼 غسيل</div>
  <div class="btn" onclick="order('صيانة')">🔧 صيانة</div>
  <div class="btn" onclick="order('طوارئ')">🚨 طوارئ</div>

  <div id="shopsList"></div>

</div>

<script>

// 🧠 المستخدم الحالي
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

// 🔁 تشغيل تلقائي
if (currentUser) {
  showApp();
}

// 🆕 تسجيل حساب
function register() {
  let phone = document.getElementById("regPhone").value;
  let pass = document.getElementById("regPass").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  if (users.some(u => u.phone === phone)) {
    alert("⚠️ الحساب موجود");
    return;
  }

  users.push({ phone, pass });
  localStorage.setItem("users", JSON.stringify(users));

  alert("✅ تم إنشاء الحساب");
}

// 🔐 تسجيل دخول
function login() {
  let phone = document.getElementById("loginPhone").value;
  let pass = document.getElementById("loginPass").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u => u.phone === phone && u.pass === pass);

  if (!user) {
    alert("❌ بيانات غلط");
    return;
  }

  localStorage.setItem("currentUser", JSON.stringify(user));
  currentUser = user;

  showApp();
}

// 🚪 خروج
function logout() {
  localStorage.removeItem("currentUser");
  location.reload();
}

// 🖥️ عرض التطبيق
function showApp() {
  document.getElementById("authBox").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// 📋 اظهار تسجيل محل
function showRegister() {
  let box = document.getElementById("registerBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

// 🔥 المحلات
let shops = JSON.parse(localStorage.getItem("shops")) || [];

// 💾 حفظ محل مربوط بالمستخدم
function saveShop() {
  let name = document.getElementById("shopName").value;
  let service = document.getElementById("shopService").value;
  let phone = document.getElementById("shopPhone").value;

  if (!name || !phone) {
    alert("❌ املأ البيانات");
    return;
  }

  // ❌ منع تكرار الرقم
  if (shops.some(s => s.phone === phone)) {
    alert("⚠️ الرقم مسجل");
    return;
  }

  let newShop = {
    name,
    service,
    phone,
    owner: currentUser.phone
  };

  shops.push(newShop);
  localStorage.setItem("shops", JSON.stringify(shops));

  alert("✅ تم تسجيل المحل");
}

// 📦 عرض
function order(service) {
  let list = shops.filter(s => s.service === service);

  let container = document.getElementById("shopsList");
  container.innerHTML = "";

  list.forEach(shop => {
    let div = document.createElement("div");
    div.innerText = "🏪 " + shop.name;

    div.onclick = () => {
      let url = `https://wa.me/${shop.phone}`;
      window.open(url);
    };

    container.appendChild(div);
  });
}

</script>


<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAcx2dw0Y-2EXMKpgyCiLe0uPkitOh9rT4&callback=initMap"></script>

</body>
</html>
